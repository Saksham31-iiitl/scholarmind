version: "3.9"

services:
  neo4j:
    image: neo4j:5.22-community
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: neo4j/scholarmind123
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p scholarmind123 'RETURN 1' || exit 1"]
      interval: 10s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
    depends_on:
      neo4j: { condition: service_healthy }
    ports: ["8000:8000"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
    environment:
      API_URL: http://api:8000
    depends_on: [api]
    ports: ["8501:8501"]

volumes:
  neo4j_data:
